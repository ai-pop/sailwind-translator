[General]
Language=ru
FromLanguage=en
OutputFile\r\Path=BepInEx\Translation\ru\Text\_AutoGeneratedTranslations.txt
OutputFile\Path=BepInEx\Translation\ru\Text\_AutoGeneratedTranslations.txt

; Какой онлайн-сервис использовать для перевода
Service=YandexTranslate
FallbackService=DeepLTranslate

; Поведение
IgnoreWhitespaceInDialogue=true
IgnoreWhitespaceInInput=true
MinCharsToTranslate=1
MaxCharsPerTranslation=500
CopyToClipboard=false
MaxCopyToClipboardLength=1000
TranslateForced=True
CacheTranslations=True

; Запретить переводу трогать уже переведённое (т.к. наш плагин это сделает)
OverrideFont=

[Behaviour]
HookTextMeshPro=True
HookUguiText=True
HookNGuiText=False
AllowOriginalHttpPost=False

[Files]
Directory=BepInEx\Translation\ru\Text
; Шаблон: BepInEx\Translation\ru\Text\<имя>.txt
